<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>검침 입력 · 양산신도시 주공3단지</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --accent: #4f7cff;
    --accent2: #ff6b35;
    --electric: #ffd600;
    --water: #00c8ff;
    --hotwater: #ff4d6d;
    --heat: #ff9500;
    --text: #e8eaf6;
    --muted: #7c82a8;
    --success: #00e676;
    --done-bg: #0a2e1a;
    --done-border: #00e676;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 10px;
  }
  .header-logo {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }
  .header-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .header-sub   { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .btn-csv {
    margin-left: auto;
    background: var(--success); color: #000;
    border: none; border-radius: 20px;
    padding: 7px 14px; font-size: 12px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
  }
  .btn-csv:active { opacity: 0.7; }

  /* ── STATS ── */
  .stats-bar {
    display: flex; gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
  }
  .stat { flex: 1; text-align: center; }
  .stat-n { font-size: 17px; font-weight: 900; font-family: 'JetBrains Mono', monospace; color: var(--accent); }
  .stat-l { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .stat-d { width: 1px; background: var(--border); margin: 2px 0; }

  /* ── PROGRESS ── */
  .progress-wrap { background: var(--surface); padding: 0 16px 8px; border-bottom: 1px solid var(--border); }
  .progress-bg { background: var(--surface2); border-radius: 4px; height: 5px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); border-radius: 4px; transition: width 0.4s ease; }

  /* ── SECTION LABEL ── */
  .sec { padding: 14px 16px 0; }
  .sec-label {
    font-size: 10px; font-weight: 700; color: var(--muted);
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .sec-label .cur-badge {
    background: var(--accent); color: #fff;
    font-size: 11px; font-weight: 700;
    border-radius: 6px; padding: 1px 8px;
    letter-spacing: 0; text-transform: none;
  }

  /* ── DONG GRID ── */
  .dong-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 7px;
  }
  .dong-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 13px; font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 10px 4px; cursor: pointer;
    text-align: center; position: relative;
    transition: all 0.13s;
  }
  .dong-btn:active { transform: scale(0.92); }
  .dong-btn.active {
    background: var(--accent); border-color: var(--accent);
    color: #fff; font-weight: 700;
    box-shadow: 0 4px 14px rgba(79,124,255,0.4);
  }
  .dong-btn .dot {
    display: block; width: 6px; height: 6px;
    background: var(--success); border-radius: 50%;
    position: absolute; top: 5px; right: 6px;
  }

  /* ── HO GRID ── */
  .ho-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 8px;
    overflow-x: auto;
  }
  .ho-table { border-collapse: collapse; width: 100%; min-width: 200px; }
  .ho-table th {
    font-size: 10px; color: var(--muted); font-weight: 700;
    padding: 4px 3px; text-align: center;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
  }
  .ho-table td {
    padding: 3px 2px; text-align: center;
  }
  .floor-cell {
    font-size: 10px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    width: 22px; padding-right: 4px;
  }
  .ho-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    padding: 5px 3px; width: 100%; min-width: 28px;
    cursor: pointer; transition: all 0.1s;
    display: block;
  }
  .ho-btn:active { transform: scale(0.85); }
  .ho-btn.active {
    background: var(--accent2); border-color: var(--accent2);
    color: #fff; font-weight: 700;
    box-shadow: 0 2px 8px rgba(255,107,53,0.4);
  }
  .ho-btn.done {
    background: var(--done-bg); border-color: var(--done-border);
    color: var(--success);
  }
  .ho-btn.done.active {
    background: var(--accent2); border-color: var(--accent2); color: #fff;
  }
  .ho-btn.empty { background: transparent; border-color: transparent; cursor: default; }

  /* ── INPUT CARD ── */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-head {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 11px 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-dong { font-size: 18px; font-weight: 900; font-family: 'JetBrains Mono', monospace; color: var(--accent); }
  .card-lbl  { font-size: 12px; color: var(--muted); }

  .meter-row {
    display: flex; align-items: center;
    padding: 11px 14px; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .meter-row:last-child { border-bottom: none; }
  .m-icon {
    width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .m-icon.e { background: rgba(255,214,0,0.13); }
  .m-icon.w { background: rgba(0,200,255,0.13); }
  .m-icon.h { background: rgba(255,77,109,0.13); }
  .m-icon.n { background: rgba(255,149,0,0.13); }

  .m-label { flex: 1; }
  .m-name { font-size: 12px; font-weight: 700; margin-bottom: 1px; }
  .m-name.e { color: var(--electric); }
  .m-name.w { color: var(--water); }
  .m-name.h { color: var(--hotwater); }
  .m-name.n { color: var(--heat); }
  .m-unit { font-size: 10px; color: var(--muted); }

  .m-input-wrap { position: relative; }
  .m-input {
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 9px; color: var(--text);
    font-size: 16px; font-family: 'JetBrains Mono', monospace; font-weight: 700;
    padding: 8px 36px 8px 10px; width: 116px; text-align: right;
    outline: none; -webkit-appearance: none; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .m-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,124,255,0.18); }
  .m-input.e:focus { border-color: var(--electric); box-shadow: 0 0 0 3px rgba(255,214,0,0.13); }
  .m-input.w:focus { border-color: var(--water);    box-shadow: 0 0 0 3px rgba(0,200,255,0.13); }
  .m-input.h:focus { border-color: var(--hotwater); box-shadow: 0 0 0 3px rgba(255,77,109,0.13); }
  .m-input.n:focus { border-color: var(--heat);     box-shadow: 0 0 0 3px rgba(255,149,0,0.13); }
  .m-unit-badge {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    font-size: 9px; color: var(--muted); pointer-events: none;
  }

  /* ── ACTION BUTTONS ── */
  .action-row { display: flex; gap: 8px; margin-top: 8px; padding: 0 16px; }
  .btn-save {
    flex: 1; background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
    border: none; border-radius: var(--radius); color: #fff;
    font-size: 15px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
    padding: 14px; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-save:active { opacity: 0.75; }
  .btn-reset {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: var(--radius); color: var(--muted);
    font-size: 12px; font-family: 'Noto Sans KR', sans-serif;
    padding: 14px 16px; cursor: pointer;
  }
  .btn-reset:active { opacity: 0.6; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--success); color: #000;
    font-weight: 700; font-size: 13px;
    padding: 10px 22px; border-radius: 24px; z-index: 999;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── HIDDEN ── */
  .hidden { display: none !important; }
  /* 전월지침 행 */
  .prev-row { display:flex; align-items:center; padding:1px 14px 5px; gap:8px; }
  .prev-label { flex:1; font-size:10px; }
  .prev-val { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); width:116px; text-align:right; padding-right:4px; }
  .prev-val.has-data { color:var(--success); font-weight:700; }
  /* 히스토리 탭 */
  .hist-tab { background:var(--surface2); border:1.5px solid var(--border); border-radius:16px; color:var(--muted); font-size:11px; font-family:'Noto Sans KR',sans-serif; padding:4px 10px; cursor:pointer; }
  .hist-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  /* ── 조회 화면 ── */
  .view-overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:var(--bg); z-index:500; overflow-y:auto; padding-bottom:40px;
  }
  .view-overlay.show { display:block; }
  .view-header {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:12px 16px; display:flex; align-items:center; gap:10px;
    position:sticky; top:0; z-index:10;
  }
  .btn-back {
    background:var(--surface2); border:1.5px solid var(--border);
    border-radius:20px; color:var(--text); font-size:13px;
    font-family:'Noto Sans KR',sans-serif; padding:6px 14px; cursor:pointer;
  }
  .view-title { font-size:15px; font-weight:700; }
  .ym-grid { display:flex; gap:6px; flex-wrap:wrap; padding:12px 16px 0; }
  .ym-btn {
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:20px; color:var(--text); font-size:13px; font-weight:600;
    font-family:'Noto Sans KR',sans-serif; padding:6px 14px; cursor:pointer;
  }
  .ym-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .view-result {
    margin:12px 16px 0;
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); overflow:hidden;
  }
  .view-result-head {
    background:var(--surface2); border-bottom:1px solid var(--border);
    padding:10px 14px; font-size:14px; font-weight:700; color:var(--accent);
    font-family:'JetBrains Mono',monospace;
  }
  .view-meter-row {
    display:flex; align-items:center; padding:11px 14px; gap:10px;
    border-bottom:1px solid var(--border);
  }
  .view-meter-row:last-child { border-bottom:none; }
  .view-val {
    font-size:17px; font-family:'JetBrains Mono',monospace; font-weight:700;
    color:var(--text); width:116px; text-align:right;
  }
  .view-val.empty { color:var(--muted); font-size:13px; }
  .btn-view-csv {
    margin:10px 16px 0; display:block; width:calc(100% - 32px);
    background:var(--success); color:#000; border:none;
    border-radius:var(--radius); font-size:14px; font-weight:700;
    font-family:'Noto Sans KR',sans-serif; padding:13px; cursor:pointer;
  }
  /* ── 방향 버튼 ── */
  .nav-grid {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 4px;
    margin: 10px 0 0;
    height: 110px;
  }
  .nav-btn {
    background: #1e7e3e;
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 8px 4px;
    cursor: pointer;
    text-align: center;
    transition: opacity 0.15s;
    line-height: 1.4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .nav-btn:active { opacity: 0.7; }
  .nav-btn.nav-empty {
    background: #2a2a3a;
    border: 1.5px dashed #3a3a5a;
    cursor: default;
    opacity: 0.4;
  }
  .nav-btn-up    { grid-column: 2; grid-row: 1; }
  .nav-btn-down  { grid-column: 2; grid-row: 2; }
  .nav-btn-left  { grid-column: 1; grid-row: 1 / span 2; font-size:12px; }
  .nav-btn-right { grid-column: 3; grid-row: 1 / span 2; font-size:12px; }
  .nav-arrow { font-size: 16px; margin-bottom: 2px; }
  .nav-honum { font-size: 13px; font-weight: 700; }
  .nav-next-unchecked {
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    background: #1e7e3e;
    border-radius: 10px;
    margin-top: 4px;
    padding: 12px;
    cursor: pointer;
  }
  .btn-save-main {
    width: 100%;
    background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 14px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s;
  }
  .btn-save-main:active { opacity: 0.75; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">⚡</div>
  <div>
    <div class="header-title">양산신도시 주공3단지</div>
    <div class="header-sub">검침 입력 보조 · 1,008세대</div>
  </div>
  <div style="display:flex;gap:5px;align-items:center;">
    <button class="btn-csv" style="font-size:11px;padding:6px 10px;background:#22263a;border:1.5px solid #4f7cff;" onclick="openViewMode()">📋 조회</button>
    <label class="btn-csv" style="font-size:11px;padding:6px 10px;background:#f59e0b;cursor:pointer;">📂 전월
      <input type="file" accept=".csv" style="display:none;" onchange="uploadPrevCSV(event)">
    </label>
    <button class="btn-csv" style="font-size:11px;padding:6px 10px;" onclick="downloadCSV('dong')">📥 동별</button>
    <button class="btn-csv" style="font-size:11px;padding:6px 10px;background:#a78bfa;" onclick="downloadCSV('all')">📦 전체</button>
    <button class="btn-csv" style="background:#ff6b35;padding:6px 10px;font-size:11px;" onclick="clearAllData()">📅 마감</button>
  </div>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat">
    <div class="stat-n" id="s-done">0</div>
    <div class="stat-l">완료</div>
  </div>
  <div class="stat-d"></div>
  <div class="stat">
    <div class="stat-n">1008</div>
    <div class="stat-l">전체</div>
  </div>
  <div class="stat-d"></div>
  <div class="stat">
    <div class="stat-n" id="s-pct">0%</div>
    <div class="stat-l">진행률</div>
  </div>
  <div class="stat-d"></div>
  <div class="stat">
    <div class="stat-n" id="s-cur">-</div>
    <div class="stat-l">현재</div>
  </div>
</div>
<div class="progress-wrap">
  <div class="progress-bg">
    <div class="progress-fill" id="prog" style="width:0%"></div>
  </div>
</div>

<!-- 전월지침 상태 + 히스토리 -->
<div class="sec" style="padding-bottom:6px;">
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <span id="prev-status" style="font-size:12px;color:var(--muted);">📂 전월 지침: 미업로드</span>
  </div>
  <div id="hist-tabs" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;"></div>
</div>

<!-- ① 동 선택 -->
<div class="sec">
  <div class="sec-label">동 선택</div>
  <div class="dong-grid" id="dong-grid"></div>
</div>

<!-- ② 호 선택 -->
<div class="sec hidden" id="sec-ho">
  <div class="sec-label">
    호 선택
    <span class="cur-badge" id="ho-badge">301동</span>
  </div>
  <div class="ho-wrap">
    <table class="ho-table" id="ho-table"></table>
  </div>
</div>

<!-- ③ 검침 입력 -->
<div class="sec hidden" id="sec-input">
  <div class="sec-label">
    검침 입력
    <span class="cur-badge" id="input-badge">301동 101호</span>
  </div>
  <div class="input-card">
    <div class="card-head">
      <span class="card-dong" id="card-dong">-</span>
      <span class="card-lbl">검침값 입력</span>
    </div>
    <div class="meter-row">
      <div class="m-icon e">⚡</div>
      <div class="m-label"><div class="m-name e">전기</div><div class="m-unit">kWh</div></div>
      <div class="m-input-wrap">
        <input class="m-input e" id="inp-e" type="number" inputmode="decimal" placeholder="0.0" autocomplete="off">
        <span class="m-unit-badge">kWh</span>
      </div>
    </div>
    <div class="prev-row"><span class="prev-label" style="color:var(--electric);">전월지침</span><span class="prev-val" id="prev-e">-</span></div>
    <div class="meter-row">
      <div class="m-icon n">🌡️</div>
      <div class="m-label"><div class="m-name n">난방</div><div class="m-unit">m³</div></div>
      <div class="m-input-wrap">
        <input class="m-input n" id="inp-n" type="number" inputmode="decimal" placeholder="0.0" autocomplete="off">
        <span class="m-unit-badge">m³</span>
      </div>
    </div>
    <div class="prev-row"><span class="prev-label" style="color:var(--heat);">전월지침</span><span class="prev-val" id="prev-n">-</span></div>
    <div class="meter-row">
      <div class="m-icon w">💧</div>
      <div class="m-label"><div class="m-name w">수도</div><div class="m-unit">m³</div></div>
      <div class="m-input-wrap">
        <input class="m-input w" id="inp-w" type="number" inputmode="decimal" placeholder="0.0" autocomplete="off">
        <span class="m-unit-badge">m³</span>
      </div>
    </div>
    <div class="prev-row"><span class="prev-label" style="color:var(--water);">전월지침</span><span class="prev-val" id="prev-w">-</span></div>
    <div class="meter-row">
      <div class="m-icon h">🚿</div>
      <div class="m-label"><div class="m-name h">온수</div><div class="m-unit">m³</div></div>
      <div class="m-input-wrap">
        <input class="m-input h" id="inp-h" type="number" inputmode="decimal" placeholder="0.0" autocomplete="off">
        <span class="m-unit-badge">m³</span>
      </div>
    </div>
    <div class="prev-row"><span class="prev-label" style="color:var(--hotwater);">전월지침</span><span class="prev-val" id="prev-h">-</span></div>
  </div>
  <!-- 방향 버튼 -->
  <div class="nav-grid" id="nav-grid">
    <button class="nav-btn nav-btn-left"  id="nav-left"  onclick="navMove('left')">
      <span class="nav-arrow">←</span><span class="nav-honum" id="nav-left-ho"></span>
    </button>
    <button class="nav-btn nav-btn-up"    id="nav-up"    onclick="navMove('up')">
      <span class="nav-arrow">↑</span><span class="nav-honum" id="nav-up-ho"></span>
    </button>
    <button class="nav-btn nav-btn-right" id="nav-right" onclick="navMove('right')">
      <span class="nav-arrow">→</span><span class="nav-honum" id="nav-right-ho"></span>
    </button>
    <button class="nav-btn nav-btn-down"  id="nav-down"  onclick="navMove('down')">
      <span class="nav-arrow">↓</span><span class="nav-honum" id="nav-down-ho"></span>
    </button>
  </div>
  <!-- 다음 미검침 -->
  <div class="nav-next-unchecked" id="nav-next-btn" onclick="navNextUnchecked()">» 다음 미검침 (-)</div>
  <!-- 저장 + 초기화 -->
  <div style="display:flex;gap:8px;margin-top:8px;">
    <button class="btn-save-main" onclick="saveEntry()">💾 저장</button>
    <button class="btn-reset" onclick="resetInputs()">초기화</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 검침 조회 오버레이 -->
<div class="view-overlay" id="view-overlay">
  <div class="view-header">

  <!-- 월 선택 -->
  <div class="sec" id="view-month-sec" style="display:none;padding-bottom:4px;">

  <!-- 동 선택 -->
  <div class="sec" id="view-dong-sec" style="display:none;padding-bottom:4px;">
    <div class="sec-label">동 선택 <span class="cur-badge" id="view-ym-badge"></span></div>

  <!-- CSV 다운로드 -->

  </div>

  <div class="sec" id="view-result-sec" style="display:none;">
    <div class="sec-label">검침값 <span class="cur-badge" id="view-ho-badge"></span></div>

      <div class="view-meter-row">
        <div class="m-icon w">💧</div>
        <div class="m-label"><div class="m-name w">수도</div><div class="m-unit">m³</div></div>
        <div class="view-val" id="view-val-w">-</div>
      </div>
      <div class="view-meter-row">
        <div class="m-icon h">🚿</div>
        <div class="m-label"><div class="m-name h">온수</div><div class="m-unit">m³</div></div>
        <div class="view-val" id="view-val-h">-</div>
      </div>
      <div class="view-meter-row">
        <div class="m-icon n">🌡️</div>
        <div class="m-label"><div class="m-name n">난방</div><div class="m-unit">m³</div></div>
        <div class="view-val" id="view-val-n">-</div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  동별 세대 구성
// ═══════════════════════════════════════════
// exclude 규칙:
//   "NNN"   → 해당 호수 정확히 제외 (e.g. "103" = 모든 층 3호)
//   "*NN"   → 모든 층에서 해당 라인 제외 (e.g. "*04" = X04호 전체)
//   "NNNN"  → 특정 호 완전 제외 (e.g. "1401")

const DONG_CFG = {
  301: { floors:10, units:[1,2,3,4,5,6], excl:[] },
  302: { floors:10, units:[1,2,3,4,5,6], excl:['103'] },           // 103호 1개만 없음
  303: { floors:10, units:[1,2,3,4,5,6], excl:[] },
  304: { floors:15, units:[1,2,3,4],     excl:[] },
  305: { floors:15, units:[1,2,3,4],     excl:[] },
  306: { floors:15, units:[1,2,3,4,5,6], excl:['101','1306','1406','1506'] },
  307: { floors:15, units:[1,2,3,4,5,6], excl:['101'] },
  308: { floors:15, units:[1,2,3,4,5,6], excl:['106'] },
  309: { floors:15, units:[1,2,3,4,5,6,7,8],
         excl:['104','105','1401','1402','1403','1404','1501','1502','1503','1504'] },
  310: { floors:15, units:[1,2,3,4,5,6,7,8],
         excl:['104','105','1405','1406','1407','1408','1505','1506','1507','1508'] },
  311: { floors:15, units:[1,2,3,4],
         excl:['104','1401','1402','1501','1502'] },
  312: { floors:15, units:[1,2,3,4,5,6],
         excl:['104','1401','1402','1501','1502'] },
  313: { floors:15, units:[1,2,3,4,5,6],
         excl:['106','1401','1402','1501','1502'] },
};

// 호 목록 생성
function getHoList(dong) {
  const { floors, units, excl } = DONG_CFG[dong];
  const list = [];
  for (let f = 1; f <= floors; f++) {
    for (let u of units) {
      const hoStr = String(f * 100 + u); // e.g. "101","1506"
      if (isExcl(f, u, hoStr, excl)) continue;
      list.push(hoStr);
    }
  }
  return list;
}

function isExcl(floor, unit, hoStr, excl) {
  return excl.includes(hoStr);
}

// ═══════════════════════════════════════════
//  State
// ═══════════════════════════════════════════
let records = {};        // 당월 입력값
let prevData = {};       // 전월 지침 key: "301-101" → {electric,water,hotwater,heat}
let monthlyHistory = {}; // 월별 누적 key: "2026-05" → records snapshot
let selDong = null;
let selHo   = null;

// ═══════════════════════════════════════════
//  동 그리드
// ═══════════════════════════════════════════
function buildDongGrid() {
  const grid = document.getElementById('dong-grid');
  grid.innerHTML = '';
  Object.keys(DONG_CFG).forEach(d => {
    const dong = parseInt(d);
    const btn = document.createElement('button');
    btn.className = 'dong-btn';
    btn.dataset.dong = dong;
    btn.innerHTML = dong + '<br><span style="font-size:9px;color:var(--muted);font-weight:400" id="dstat-'+dong+'">-</span>';
    btn.onclick = () => selectDong(dong);
    grid.appendChild(btn);
  });
  updateDongStats();
}

function updateDongStats() {
  Object.keys(DONG_CFG).forEach(d => {
    const dong = parseInt(d);
    const total = getHoList(dong).length;
    const done  = getHoList(dong).filter(h => records[dong+'-'+h]).length;
    const el = document.getElementById('dstat-'+dong);
    if (el) el.textContent = done + '/' + total;
    // dot
    const btn = document.querySelector(`.dong-btn[data-dong="${dong}"]`);
    if (!btn) return;
    const existing = btn.querySelector('.dot');
    if (done > 0 && !existing) {
      const dot = document.createElement('span'); dot.className = 'dot';
      btn.appendChild(dot);
    } else if (done === 0 && existing) existing.remove();
  });
}

// ═══════════════════════════════════════════
//  동 선택
// ═══════════════════════════════════════════
function selectDong(dong) {
  selDong = dong;
  selHo   = null;

  document.querySelectorAll('.dong-btn').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.dong) === dong));

  buildHoTable(dong);
  document.getElementById('sec-ho').classList.remove('hidden');
  document.getElementById('sec-input').classList.add('hidden');
  document.getElementById('ho-badge').textContent = dong + '동';

  // 호 선택 영역으로 스크롤
  document.getElementById('sec-ho').scrollIntoView({ behavior:'smooth', block:'start' });
}

// ═══════════════════════════════════════════
//  호 테이블 (층×호 그리드)
// ═══════════════════════════════════════════
function buildHoTable(dong) {
  const cfg = DONG_CFG[dong];
  const table = document.getElementById('ho-table');
  table.innerHTML = '';

  // 헤더 행
  const thead = document.createElement('thead');
  let thRow = '<tr><th>층</th>';
  cfg.units.forEach(u => { thRow += `<th>${u}호</th>`; });
  thRow += '</tr>';
  thead.innerHTML = thRow;
  table.appendChild(thead);

  // 데이터 행 (고층→저층)
  const tbody = document.createElement('tbody');
  for (let f = cfg.floors; f >= 1; f--) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="floor-cell">${f}</td>`;
    for (let u of cfg.units) {
      const hoStr = String(f * 100 + u);
      const isExcluded = isExcl(f, u, hoStr, cfg.excl);
      const td = document.createElement('td');
      if (isExcluded) {
        td.innerHTML = '<button class="ho-btn empty" disabled></button>';
      } else {
        const key = dong + '-' + hoStr;
        const isDone = records[key] ? ' done' : '';
        const isActive = selHo === hoStr ? ' active' : '';
        // 표시: 마지막 자리만 (공간 절약) 또는 전체
        const label = u;
        td.innerHTML = `<button class="ho-btn${isDone}${isActive}" data-ho="${hoStr}" onclick="selectHo('${hoStr}')">${label}</button>`;
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
}

function refreshHoBtns(dong) {
  document.querySelectorAll('#ho-table .ho-btn:not(.empty)').forEach(btn => {
    const key = dong + '-' + btn.dataset.ho;
    btn.classList.toggle('done',   !!records[key]);
    btn.classList.toggle('active', btn.dataset.ho === selHo);
  });
}

// ═══════════════════════════════════════════
//  호 선택
// ═══════════════════════════════════════════
function selectHo(hoStr) {
  selHo = hoStr;

  document.querySelectorAll('#ho-table .ho-btn:not(.empty)').forEach(b =>
    b.classList.toggle('active', b.dataset.ho === hoStr));

  // 입력창 열기
  const key = selDong + '-' + hoStr;
  const saved = records[key] || {};
  document.getElementById('inp-e').value = saved.electric  || '';
  document.getElementById('inp-w').value = saved.water     || '';
  document.getElementById('inp-h').value = saved.hotwater  || '';
  document.getElementById('inp-n').value = saved.heat      || '';

  document.getElementById('card-dong').textContent    = selDong + '동 ' + hoStr + '호';
  document.getElementById('input-badge').textContent  = selDong + '동 ' + hoStr + '호';
  document.getElementById('s-cur').textContent        = selDong + '-' + hoStr;

  // 전월 지침 표시
  const pKey = selDong + '-' + hoStr;
  const prev = prevData[pKey] || {};
  [['e','electric'],['w','water'],['h','hotwater'],['n','heat']].forEach(([t,f]) => {
    const el = document.getElementById('prev-'+t);
    const val = prev[f];
    if (val !== undefined && val !== '') {
      el.textContent = Number(val).toLocaleString();
      el.classList.add('has-data');
    } else {
      el.textContent = '-';
      el.classList.remove('has-data');
    }
  });

  document.getElementById('sec-input').classList.remove('hidden');

  document.getElementById('sec-input').scrollIntoView({ behavior:'smooth', block:'start' });
  setTimeout(() => {
    document.getElementById('inp-e').focus();
    updateNavBtns();
  }, 150);
}

// ═══════════════════════════════════════════
//  저장
// ═══════════════════════════════════════════
function saveEntry() {
  if (!selDong || !selHo) return;
  const e = (document.getElementById('inp-e').value || '').trim();
  const w = (document.getElementById('inp-w').value || '').trim();
  const h = (document.getElementById('inp-h').value || '').trim();
  const n = (document.getElementById('inp-n').value || '').trim();
  // 모두 비어있으면 미검침 상태로 복원 (삭제)
  const key = selDong + '-' + selHo;
  if (!e && !w && !h && !n) {
    if (records[key]) {
      delete records[key];
      saveToLocal(); updateStats(); refreshHoBtns(selDong); updateDongStats();
      showToast('↩️ ' + selDong + '동 ' + selHo + '호 미검침 처리');
    } else {
      showToast('⚠️ 하나 이상 입력하세요');
    }
    return;
  }

  records[key] = {
    dong: selDong, ho: selHo,
    electric: e, water: w, hotwater: h, heat: n,
    savedAt: new Date().toLocaleTimeString('ko-KR')
  };

  updateStats();
  refreshHoBtns(selDong);
  updateDongStats();
  saveToLocal();
  updateNavBtns();
  showToast('✅ ' + selDong + '동 ' + selHo + '호 저장!');

  // 다음 호 자동 이동
  const hoList = getHoList(selDong);
  const idx = hoList.indexOf(selHo);
  if (idx >= 0 && idx < hoList.length - 1) {
    const nextHo = hoList[idx + 1];
    setTimeout(() => selectHo(nextHo), 350);
    setTimeout(() => {
      const nb = document.querySelector(`#ho-table .ho-btn[data-ho="${nextHo}"]`);
      if (nb) nb.scrollIntoView({ block:'nearest', behavior:'smooth' });
    }, 400);
  } else {
    showToast('🎉 ' + selDong + '동 검침 완료!');
  }
}

function resetInputs() {
  ['inp-e','inp-w','inp-h','inp-n'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('inp-e').focus();
}

function movePrevHo() {
  if (!selDong || !selHo) return;
  const hoList = getHoList(selDong);
  const idx = hoList.indexOf(selHo);
  if (idx > 0) selectHo(hoList[idx - 1]);
  else showToast('⚠️ 첫 번째 호입니다');
}

function getAdjacentHo(direction) {
  if (!selDong || !selHo) return null;
  const cfg = DONG_CFG[selDong];
  const floor = Math.floor(parseInt(selHo) / 100);
  const unit  = parseInt(selHo) % 100;

  if (direction === 'up') {
    // 위층 같은 호
    if (floor >= cfg.floors) return null;
    const candidate = String((floor+1)*100 + unit);
    return !isExcl(floor+1, unit, candidate, cfg.excl) ? candidate : null;
  }
  if (direction === 'down') {
    if (floor <= 1) return null;
    const candidate = String((floor-1)*100 + unit);
    return !isExcl(floor-1, unit, candidate, cfg.excl) ? candidate : null;
  }
  // 좌우는 호 목록 순서 기준
  const hoList = getHoList(selDong);
  const idx = hoList.indexOf(selHo);
  if (direction === 'left')  return idx > 0 ? hoList[idx-1] : null;
  if (direction === 'right') return idx < hoList.length-1 ? hoList[idx+1] : null;
  return null;
}

function navMove(direction) {
  const target = getAdjacentHo(direction);
  if (target) selectHo(target);
  else showToast('⚠️ 이동할 수 없습니다');
}

function updateNavBtns() {
  if (!selDong || !selHo) return;
  const dirs = ['left','right','up','down'];
  dirs.forEach(d => {
    const ho = getAdjacentHo(d);
    const elHo  = document.getElementById('nav-' + d + '-ho');
    const elArr = document.querySelector('#nav-' + d + ' .nav-arrow');
    const btn   = document.getElementById('nav-' + d);
    if (!btn) return;

    if (ho) {
      btn.classList.remove('nav-empty');
      btn.onclick = () => navMove(d);
      if (elHo) elHo.textContent = ho + '호';
      if (elArr) elArr.style.opacity = '1';
    } else {
      btn.classList.add('nav-empty');
      btn.onclick = null;
      if (elHo) elHo.textContent = '';
      if (elArr) elArr.style.opacity = '0.3';
    }
  });

  // 다음 미검침
  const hoList = getHoList(selDong);
  const nextUnchecked = hoList.find(h => !records[selDong + '-' + h]);
  const nb = document.getElementById('nav-next-btn');
  if (nb) nb.textContent = nextUnchecked
    ? '» 다음 미검침 (' + nextUnchecked + '호)'
    : '✅ 이 동 검침 완료!';
}

function navNextUnchecked() {
  if (!selDong) return;
  const hoList = getHoList(selDong);
  const next = hoList.find(h => !records[selDong+'-'+h]);
  if (next) selectHo(next);
  else showToast('✅ 이 동 검침 완료!');
}

// ═══════════════════════════════════════════
//  엔터키로 다음 항목 이동
// ═══════════════════════════════════════════
const INPUT_IDS = ['inp-e','inp-n','inp-w','inp-h'];
INPUT_IDS.forEach((id, i) => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (i < INPUT_IDS.length - 1) document.getElementById(INPUT_IDS[i+1]).focus();
      else saveEntry();
    }
  });
});

// ═══════════════════════════════════════════
//  통계
// ═══════════════════════════════════════════
function updateStats() {
  const done  = Object.keys(records).length;
  const total = 1008;
  const pct   = Math.round(done / total * 100);
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-pct').textContent  = pct + '%';
  document.getElementById('prog').style.width   = pct + '%';
}

// ═══════════════════════════════════════════
//  CSV
// ═══════════════════════════════════════════
function downloadCSV(mode) {
  if (!Object.keys(records).length) { showToast('⚠️ 저장된 데이터 없음'); return; }
  const now = new Date();
  const yearMonth = now.getFullYear()+'년'+(now.getMonth()+1)+'월';
  const header = '\uFEFF동,호,전기(kWh),수도(m³),온수(m³),난방(m³),저장시각\n';

  // 입력된 동 목록 파악 (301동→313동 순서)
  const dongsWithData = [];
  Object.keys(DONG_CFG).forEach(d => {
    const dong = parseInt(d);
    const rows = [];
    getHoList(dong).forEach(ho => {
      const key = dong + '-' + ho;
      if (records[key]) rows.push(records[key]);
    });
    if (rows.length > 0) dongsWithData.push({ dong, rows });
  });

  if (dongsWithData.length === 0) { showToast('⚠️ 저장된 데이터 없음'); return; }

  if (mode === 'all') {
    // 전체 합쳐서 파일 하나로
    let csv = header;
    dongsWithData.forEach(item => {
      item.rows.forEach(r => {
        csv += [r.dong+'동', r.ho+'호', r.electric, r.water, r.hotwater, r.heat, r.savedAt].join(',') + '\n';
      });
    });
    const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = yearMonth+'_전체_검침데이터.csv';
    a.click();
    URL.revokeObjectURL(url);
    showToast('📦 전체 CSV 저장 완료! (' + dongsWithData.length + '개 동)');

  } else {
    // 동별로 파일 따로
    dongsWithData.forEach((item, idx) => {
      setTimeout(() => {
        let csv = header;
        item.rows.forEach(r => {
          csv += [r.dong+'동', r.ho+'호', r.electric, r.water, r.hotwater, r.heat, r.savedAt].join(',') + '\n';
        });
        const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
        const url  = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = yearMonth+'_'+item.dong+'동_검침데이터.csv';
        a.click();
        URL.revokeObjectURL(url);
      }, idx * 800);
    });
    showToast('📥 동별 CSV ' + dongsWithData.length + '개 저장 완료!');
  }
}

// ═══════════════════════════════════════════
//  토스트
// ═══════════════════════════════════════════
function clearAllData() {
  const now = new Date();
  const monthKey = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  if (!confirm(monthKey + ' 검침을 마감하고 초기화할까요?\n(데이터는 히스토리에 보존됩니다)')) return;

  // 당월 records를 prevData로 이전 + 히스토리 저장
  monthlyHistory[monthKey] = JSON.parse(JSON.stringify(records));
  // 당월 지침값을 전월 지침으로 자동 세팅
  Object.keys(records).forEach(key => {
    const r = records[key];
    prevData[key] = { electric: r.electric, water: r.water, hotwater: r.hotwater, heat: r.heat };
  });
  records = {};
  saveToLocal();
  updateStats();
  updateDongStats();
  updatePrevStatus();
  renderHistTabs();
  if (selDong) buildHoTable(selDong);
  document.getElementById('sec-input').classList.add('hidden');
  showToast('✅ ' + monthKey + ' 마감 완료! 전월 지침 자동 업데이트');
}

// ── 전월 CSV 업로드 (A=동, B=호, C=전월지침, D=당월지침) ──
function uploadPrevCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.split('\n').filter(l => l.trim());
    let count = 0;
    lines.forEach(line => {
      // BOM 제거
      line = line.replace(/^\uFEFF/, '');
      const cols = line.split(',');
      if (cols.length < 3) return;
      const dong = cols[0].toString().trim().replace('동','');
      const ho   = cols[1].toString().trim().replace('호','');
      const prev = cols[2].toString().trim();
      if (!dong || !ho || isNaN(parseInt(dong))) return;
      const key = dong + '-' + ho;
      if (!prevData[key]) prevData[key] = {};
      // C열 = 전월지침 (전기/수도/온수/난방 통합 - 항목별 파일이면 그대로 사용)
      // 사진 형식: 동,호,전월지침(전기),전월지침(수도),전월지침(온수),전월지침(난방)
      // A=동(0), B=호(1), C=전기전월(2), D=난방전월(3), E=수도전월(4), F=온수전월(5)
      prevData[key].electric = cols[2] ? cols[2].trim() : '';
      prevData[key].heat     = cols[3] ? cols[3].trim() : '';
      prevData[key].water    = cols[4] ? cols[4].trim() : '';
      prevData[key].hotwater = cols[5] ? cols[5].trim() : '';
      count++;
    });
    saveToLocal();
    updatePrevStatus();
    showToast('✅ 전월 지침 ' + count + '세대 업로드 완료!');
  };
  reader.readAsText(file, 'utf-8');
  event.target.value = '';
}

function updatePrevStatus() {
  const count = Object.keys(prevData).length;
  const el = document.getElementById('prev-status');
  if (el) el.innerHTML = count > 0
    ? '✅ 전월 지침: <span style="color:var(--success);font-weight:700;">' + count + '세대 로드됨</span>'
    : '📂 전월 지침: 미업로드';
}

// ── 히스토리 탭 렌더링 ──
function renderHistTabs() {
  const wrap = document.getElementById('hist-tabs');
  if (!wrap) return;
  const months = Object.keys(monthlyHistory).sort().reverse();
  if (months.length === 0) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = '<span style="font-size:10px;color:var(--muted);margin-right:4px;">지난 검침:</span>' +
    months.map(m => `<button class="hist-tab" onclick="viewHistory('${m}')">${m}</button>`).join('');
}

function viewHistory(monthKey) {
  const hist = monthlyHistory[monthKey];
  if (!hist) return;
  const keys = Object.keys(hist).sort();
  if (!keys.length) { showToast('데이터 없음'); return; }
  const now = new Date();
  const yearMonth = monthKey.replace('-','년') + '월';
  let csv = '\uFEFF동,호,전기(kWh),수도(m³),온수(m³),난방(m³)\n';
  // 동→호 순서로 정렬
  Object.keys(DONG_CFG).forEach(d => {
    const dong = parseInt(d);
    getHoList(dong).forEach(ho => {
      const key = dong + '-' + ho;
      if (hist[key]) {
        const r = hist[key];
        csv += [r.dong+'동', r.ho+'호', r.electric, r.water, r.hotwater, r.heat].join(',') + '\n';
      }
    });
  });
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = yearMonth + '_검침데이터.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('📥 ' + yearMonth + ' 데이터 다운로드!');
}

// ══════════════════════════════════════════
//  검침 조회 모드
// ══════════════════════════════════════════
let viewSelYear = null;
let viewSelMonth = null;
let viewSelDong = null;
let viewSelHo = null;

function openViewMode() {
  document.getElementById('view-overlay').classList.add('show');
  buildViewYearGrid();
}
function closeViewMode() {
  document.getElementById('view-overlay').classList.remove('show');
}

function getViewData() {
  // 당월 데이터
  const now = new Date();
  const curKey = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  const allData = Object.assign({}, monthlyHistory);
  if (Object.keys(records).length > 0) allData[curKey] = records;
  return allData;
}

function buildViewYearGrid() {
  const allData = getViewData();
  const years = [...new Set(Object.keys(allData).map(k => k.split('-')[0]))].sort().reverse();
  // 데이터 없어도 현재 연도 표시
  const nowYear = String(new Date().getFullYear());
  if (!years.includes(nowYear)) years.unshift(nowYear);

  const grid = document.getElementById('view-year-grid');
  grid.innerHTML = years.map(y =>
    `<button class="ym-btn${viewSelYear===y?' active':''}" onclick="selectViewYear('${y}')">${y}년</button>`
  ).join('');
}

function selectViewYear(year) {
  viewSelYear = year;
  viewSelMonth = null; viewSelDong = null; viewSelHo = null;
  buildViewYearGrid();

  const allData = getViewData();
  const months = Object.keys(allData).filter(k => k.startsWith(year)).map(k => k.split('-')[1]).sort();
  const nowKey = new Date().getFullYear() + '-' + String(new Date().getMonth()+1).padStart(2,'0');
  if (year === String(new Date().getFullYear()) && !months.includes(String(new Date().getMonth()+1).padStart(2,'0')) && Object.keys(records).length > 0) {
    months.push(String(new Date().getMonth()+1).padStart(2,'0'));
  }

  const grid = document.getElementById('view-month-grid');
  grid.innerHTML = months.map(m =>
    `<button class="ym-btn" onclick="selectViewMonth('${m}')">${parseInt(m)}월</button>`
  ).join('') || '<span style="color:var(--muted);font-size:13px;">데이터 없음</span>';

  document.getElementById('view-month-sec').style.display = 'block';
  document.getElementById('view-dong-sec').style.display = 'none';
  document.getElementById('view-ho-sec').style.display = 'none';
  document.getElementById('view-result-sec').style.display = 'none';
  document.getElementById('view-csv-sec').style.display = 'none';
}

function selectViewMonth(month) {
  viewSelMonth = month;
  viewSelDong = null; viewSelHo = null;
  const ymKey = viewSelYear + '-' + month.padStart(2,'0');
  document.getElementById('view-ym-badge').textContent = viewSelYear + '년 ' + parseInt(month) + '월';

  // 월 버튼 active
  document.querySelectorAll('#view-month-grid .ym-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === parseInt(month)+'월');
  });

  // 동 그리드
  const grid = document.getElementById('view-dong-grid');
  grid.innerHTML = '';
  Object.keys(DONG_CFG).forEach(d => {
    const dong = parseInt(d);
    const btn = document.createElement('button');
    btn.className = 'dong-btn';
    btn.dataset.dong = dong;
    const allData = getViewData();
    const monthData = allData[ymKey] || {};
    const done = getHoList(dong).filter(h => monthData[dong+'-'+h]).length;
    const total = getHoList(dong).length;
    btn.innerHTML = dong + '<br><span style="font-size:9px;color:var(--muted);">' + done + '/' + total + '</span>';
    btn.onclick = () => selectViewDong(dong);
    grid.appendChild(btn);
  });

  document.getElementById('view-dong-sec').style.display = 'block';
  document.getElementById('view-ho-sec').style.display = 'none';
  document.getElementById('view-result-sec').style.display = 'none';

  // CSV 버튼
  document.getElementById('view-csv-sec').style.display = 'block';
  document.getElementById('view-csv-btn').onclick = () => downloadViewCSV(ymKey);
}

function selectViewDong(dong) {
  viewSelDong = dong;
  viewSelHo = null;
  const ymKey = viewSelYear + '-' + viewSelMonth.padStart(2,'0');
  document.getElementById('view-dong-badge').textContent = dong + '동';

  document.querySelectorAll('#view-dong-grid .dong-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.dong) === dong);
  });

  // 호 테이블
  const cfg = DONG_CFG[dong];
  const allData = getViewData();
  const monthData = allData[ymKey] || {};
  const table = document.getElementById('view-ho-table');
  table.innerHTML = '';
  const thead = document.createElement('thead');
  thead.innerHTML = '<tr><th>층</th>' + cfg.units.map(u=>`<th>${u}호</th>`).join('') + '</tr>';
  table.appendChild(thead);
  const tbody = document.createElement('tbody');
  for (let f = cfg.floors; f >= 1; f--) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="floor-cell">${f}</td>`;
    for (let u of cfg.units) {
      const hoStr = String(f*100+u);
      const isExcluded = isExcl(f, u, hoStr, cfg.excl);
      const td = document.createElement('td');
      if (isExcluded) {
        td.innerHTML = '<button class="ho-btn empty" disabled></button>';
      } else {
        const key = dong + '-' + hoStr;
        const isDone = monthData[key] ? ' done' : '';
        td.innerHTML = `<button class="ho-btn${isDone}" onclick="selectViewHo('${hoStr}')">${u}</button>`;
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  document.getElementById('view-ho-sec').style.display = 'block';
  document.getElementById('view-result-sec').style.display = 'none';
}

function selectViewHo(hoStr) {
  viewSelHo = hoStr;
  const ymKey = viewSelYear + '-' + viewSelMonth.padStart(2,'0');
  const allData = getViewData();
  const monthData = allData[ymKey] || {};
  const key = viewSelDong + '-' + hoStr;
  const r = monthData[key];

  document.getElementById('view-ho-badge').textContent = viewSelDong + '동 ' + hoStr + '호';
  document.getElementById('view-result-title').textContent = viewSelYear + '년 ' + parseInt(viewSelMonth) + '월 · ' + viewSelDong + '동 ' + hoStr + '호';

  [['e','electric'],['w','water'],['h','hotwater'],['n','heat']].forEach(([t,f]) => {
    const el = document.getElementById('view-val-'+t);
    if (r && r[f] !== undefined && r[f] !== '') {
      el.textContent = Number(r[f]).toLocaleString();
      el.classList.remove('empty');
    } else {
      el.textContent = '미검침';
      el.classList.add('empty');
    }
  });

  document.querySelectorAll('#view-ho-table .ho-btn:not(.empty)').forEach(b => {
    b.classList.toggle('active', b.onclick && b.onclick.toString().includes(hoStr) && b.textContent == String(parseInt(hoStr)%100));
  });

  document.getElementById('view-result-sec').style.display = 'block';
  document.getElementById('view-result-sec').scrollIntoView({behavior:'smooth', block:'start'});
}

function downloadViewCSV(ymKey) {
  const allData = getViewData();
  const monthData = allData[ymKey] || {};
  if (!Object.keys(monthData).length) { showToast('⚠️ 데이터 없음'); return; }
  const [year, month] = ymKey.split('-');
  let csv = '\uFEFF동,호,전기(kWh),수도(m³),온수(m³),난방(m³),저장시각\n';
  Object.keys(DONG_CFG).forEach(d => {
    const dong = parseInt(d);
    getHoList(dong).forEach(ho => {
      const key = dong + '-' + ho;
      if (monthData[key]) {
        const r = monthData[key];
        csv += [r.dong+'동', r.ho+'호', r.electric, r.water, r.hotwater, r.heat, r.savedAt||''].join(',') + '\n';
      }
    });
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = year+'년'+parseInt(month)+'월_검침데이터.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('📥 ' + year + '년 ' + parseInt(month) + '월 CSV 저장!');
}

let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════
//  localStorage 자동저장
// ═══════════════════════════════════════════
const STORAGE_KEY = 'jeomsim_records_v1';

function saveToLocal() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    localStorage.setItem(STORAGE_KEY+'_prev', JSON.stringify(prevData));
    localStorage.setItem(STORAGE_KEY+'_hist', JSON.stringify(monthlyHistory));
  } catch(e) {}
}

function loadFromLocal() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) { records = JSON.parse(data); updateStats(); updateDongStats(); }
    const prev = localStorage.getItem(STORAGE_KEY+'_prev');
    if (prev) { prevData = JSON.parse(prev); updatePrevStatus(); }
    const hist = localStorage.getItem(STORAGE_KEY+'_hist');
    if (hist) { monthlyHistory = JSON.parse(hist); renderHistTabs(); }
  } catch(e) {}
}

// ═══════════════════════════════════════════
//  초기화
// ═══════════════════════════════════════════
buildDongGrid();
loadFromLocal();
updatePrevStatus();
renderHistTabs();
buildViewYearGrid();
</script>
